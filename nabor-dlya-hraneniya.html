<!doctype html>
<html lang="ru">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<meta content="true" name="HandheldFriendly" />
	<meta content="width" name="MobileOptimized" />
	<meta content="yes" name="apple-mobile-web-app-capable" />
	<meta name="robots" content="noindex, nofollow">

	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="css/styles.css">
	<link rel="stylesheet" href="css/catalog.css">

	<title>Набор для хранения — внутренняя страница</title>
</head>

<body class="page-catalog">
	<div class="page-catalog__main">
		<h2>«Набор для хранения инструментов»</h2>
		<h3>Информация по комплекту</h3>

		<div class="page-catalog__section">
			<h4>В набор входит:</h4>
			<picture>
				<source type="image/webp" srcset="css/images/nabor-dlya-hraneniya1.webp">
				<img src="css/images/nabor-dlya-hraneniya1.jpg" class="catalog-img" alt="Состав набора">
			</picture>
		</div>

		<div class="page-catalog__section">
			<h4>1. Настенные планки<br>6×</h4>
			<picture>
				<source type="image/webp" srcset="css/images/nastennye-planki2.webp">
				<img src="css/images/nastennye-planki2.jpg" class="catalog-img" alt="Настенные планки">
			</picture>
		</div>

		<div class="page-catalog__section">
			<h4>2. Лотки для метизов<br>4×, 4×</h4>
			<picture>
				<source type="image/webp" srcset="css/images/lotok-dlya-metiza3.webp">
				<img src="css/images/lotok-dlya-metiza3.jpg" class="catalog-img" alt="Лотки для метизов">
			</picture>
		</div>

		<div class="page-catalog__section">
			<h4>3. Держатель для ключей<br>2×</h4>
			<picture>
				<source type="image/webp" srcset="css/images/derzhatel-dlya-klyuchej.webp">
				<img src="css/images/derzhatel-dlya-klyuchej.jpg" class="catalog-img" alt="Держатель для ключей">
			</picture>
		</div>

		<div class="page-catalog__section">
			<h4>4. Держатель для отвёрток<br>1×</h4>
			<picture>
				<source type="image/webp" srcset="css/images/derzhatel-dlya-otvertok.webp">
				<img src="css/images/derzhatel-dlya-otvertok.jpg" class="catalog-img" alt="Держатель для отвёрток">
			</picture>
		</div>

		<div class="page-catalog__section">
			<h4>5. Зажим<br>5×</h4>
			<picture>
				<source type="image/webp" srcset="css/images/zazhim.webp">
				<img src="css/images/zazhim.jpg" class="catalog-img" alt="Зажим">
			</picture>
		</div>

		<div class="page-catalog__section">
			<h4>6. Крючок<br>10×</h4>
			<picture>
				<source type="image/webp" srcset="css/images/kryuchok.webp">
				<img src="css/images/kryuchok.jpg" class="catalog-img" alt="Крючок">
			</picture>
		</div>

		<div class="page-catalog__section">
			<h4>Фото в сборке</h4>
			<div class="catalog-photo-stack">
				<picture>
					<source type="image/webp" srcset="css/images/nabor7.webp">
					<img src="css/images/nabor7.jpg" class="catalog-img" alt="Лотки в комплекте">
				</picture>
				<picture>
					<source type="image/webp" srcset="css/images/lotok5.webp">
					<img src="css/images/lotok5.jpg" class="catalog-img" alt="Лотки для метизов">
				</picture>
			</div>
		</div>
	</div>

	<div id="site-footer-root"></div>
	<script src="js/site-footer.js" defer></script>
	<script src="js/site-modal.js" defer></script>
</body>

</html>
