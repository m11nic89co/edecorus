name: Deploy static site to Yandex Cloud

on:
  workflow_dispatch:
    inputs:
      site:
        description: Which site to deploy
        required: true
        type: choice
        options:
          - vaza.com.ru
          - vazon.com.ru
          - edecorus.ru
          - all-vaza-vazon

jobs:
  deploy-vaza:
    if: inputs.site == 'vaza.com.ru' || inputs.site == 'all-vaza-vazon'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: m11nic89co/vaza.com.ru
          ref: main
      - name: Deploy vaza.com.ru
        env:
          YC_SA_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY_ID }}
          YC_SA_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli
          aws configure set aws_access_key_id "${YC_SA_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${YC_SA_SECRET_ACCESS_KEY}"
          aws configure set default.region ru-central1
          aws s3 sync . s3://vaza.com.ru \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --exclude '.git/*' --exclude '.github/*' --exclude '*.md' \
            --exclude '.gitignore' --exclude '*.zip' --exclude '.DS_Store'
          curl -fsI http://vaza.com.ru.website.yandexcloud.net/ | head -5

  deploy-vazon:
    if: inputs.site == 'vazon.com.ru' || inputs.site == 'all-vaza-vazon'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: m11nic89co/vazon.com.ru
          ref: main
      - name: Deploy vazon.com.ru
        env:
          YC_SA_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY_ID }}
          YC_SA_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli
          aws configure set aws_access_key_id "${YC_SA_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${YC_SA_SECRET_ACCESS_KEY}"
          aws configure set default.region ru-central1
          aws s3 sync . s3://vazon.com.ru \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --exclude '.git/*' --exclude '.github/*' --exclude 'CNAME'
          curl -fsI http://vazon.com.ru.website.yandexcloud.net/ | head -5

  deploy-edecorus:
    if: inputs.site == 'edecorus.ru'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy edecorus.ru
        env:
          YC_SA_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY_ID }}
          YC_SA_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli
          aws configure set aws_access_key_id "${YC_SA_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${YC_SA_SECRET_ACCESS_KEY}"
          aws configure set default.region ru-central1
          aws s3 sync . s3://edecorus.ru \
            --endpoint-url https://storage.yandexcloud.net \
            --delete \
            --exclude '.git/*' --exclude '.github/*' --exclude '.vscode/*' \
            --exclude '.cursor/*' --exclude 'scripts/*' --exclude 'drive-archive/*' \
            --exclude 'docs/*' --exclude '*.md' --exclude 'clone.ps1' \
            --exclude '.gitignore' --exclude 'CONTEXT.md' --exclude 'CNAME'
          curl -fsI http://edecorus.ru.website.yandexcloud.net/ | head -5
