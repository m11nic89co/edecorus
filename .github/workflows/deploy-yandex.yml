name: Deploy static site to Yandex Cloud

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'drive-archive/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      site:
        description: Which site to deploy
        required: true
        type: choice
        options:
          - vaza.com.ru
          - vazon.com.ru
          - edecorus.ru
          - all-vaza-vazon

jobs:
  deploy-vaza:
    if: github.event_name == 'workflow_dispatch' && (inputs.site == 'vaza.com.ru' || inputs.site == 'all-vaza-vazon')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: m11nic89co/vaza.com.ru
          ref: main
      - name: Deploy vaza.com.ru
        env:
          YC_SA_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY_ID }}
          YC_SA_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli
          aws configure set aws_access_key_id "${YC_SA_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${YC_SA_SECRET_ACCESS_KEY}"
          aws configure set default.region ru-central1
          ENDPOINT=https://storage.yandexcloud.net
          BUCKET=vaza.com.ru
          aws s3 mb "s3://${BUCKET}" --endpoint-url "$ENDPOINT" 2>/dev/null || true
          aws s3api put-bucket-website --bucket "$BUCKET" --endpoint-url "$ENDPOINT" \
            --website-configuration '{"IndexDocument":{"Suffix":"index.html"},"ErrorDocument":{"Key":"404.html"}}' || true
          aws s3 sync . "s3://${BUCKET}" \
            --endpoint-url "$ENDPOINT" \
            --delete \
            --acl public-read \
            --exclude '.git/*' --exclude '.github/*' --exclude '*.md' \
            --exclude '.gitignore' --exclude '*.zip' --exclude '.DS_Store'
          curl -fsI "http://${BUCKET}.website.yandexcloud.net/" | head -5

  deploy-vazon:
    if: github.event_name == 'workflow_dispatch' && (inputs.site == 'vazon.com.ru' || inputs.site == 'all-vaza-vazon')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: m11nic89co/vazon.com.ru
          ref: main
      - name: Deploy vazon.com.ru
        env:
          YC_SA_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY_ID }}
          YC_SA_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli
          aws configure set aws_access_key_id "${YC_SA_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${YC_SA_SECRET_ACCESS_KEY}"
          aws configure set default.region ru-central1
          ENDPOINT=https://storage.yandexcloud.net
          BUCKET=vazon.com.ru
          aws s3 mb "s3://${BUCKET}" --endpoint-url "$ENDPOINT" 2>/dev/null || true
          aws s3api put-bucket-website --bucket "$BUCKET" --endpoint-url "$ENDPOINT" \
            --website-configuration '{"IndexDocument":{"Suffix":"index.html"},"ErrorDocument":{"Key":"404.html"}}' || true
          aws s3 sync . "s3://${BUCKET}" \
            --endpoint-url "$ENDPOINT" \
            --delete \
            --acl public-read \
            --exclude '.git/*' --exclude '.github/*' --exclude 'CNAME'
          curl -fsI "http://${BUCKET}.website.yandexcloud.net/" | head -5

  deploy-edecorus:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.site == 'edecorus.ru')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Deploy edecorus.ru
        env:
          YC_SA_ACCESS_KEY_ID: ${{ secrets.YC_SA_ACCESS_KEY_ID }}
          YC_SA_SECRET_ACCESS_KEY: ${{ secrets.YC_SA_SECRET_ACCESS_KEY }}
        run: |
          pip install awscli
          aws configure set aws_access_key_id "${YC_SA_ACCESS_KEY_ID}"
          aws configure set aws_secret_access_key "${YC_SA_SECRET_ACCESS_KEY}"
          aws configure set default.region ru-central1
          ENDPOINT=https://storage.yandexcloud.net
          BUCKET=edecorus.ru

          aws s3 mb "s3://${BUCKET}" --endpoint-url "$ENDPOINT" 2>/dev/null || true

          aws s3api put-bucket-website --bucket "$BUCKET" --endpoint-url "$ENDPOINT" \
            --website-configuration '{"IndexDocument":{"Suffix":"index.html"},"ErrorDocument":{"Key":"404.html"}}' \
            && echo "Website hosting configured" \
            || echo "WARN: put-bucket-website skipped (configure in YC console if needed)"

          POLICY='{"Version":"2012-10-17","Statement":[{"Sid":"PublicRead","Effect":"Allow","Principal":"*","Action":["s3:GetObject"],"Resource":["arn:aws:s3:::'"${BUCKET}"'/*"]}]}'
          aws s3api put-bucket-policy --bucket "$BUCKET" --endpoint-url "$ENDPOINT" --policy "$POLICY" \
            && echo "Bucket policy set" \
            || echo "WARN: put-bucket-policy skipped (enable public read in YC console)"

          upload_file() {
            local file="$1"
            local key="${file#./}"
            local ctype
            case "$file" in
              *.html) ctype="text/html; charset=utf-8" ;;
              *.css) ctype="text/css; charset=utf-8" ;;
              *.js) ctype="application/javascript; charset=utf-8" ;;
              *.json) ctype="application/json; charset=utf-8" ;;
              *.xml) ctype="application/xml; charset=utf-8" ;;
              *.txt) ctype="text/plain; charset=utf-8" ;;
              *.svg) ctype="image/svg+xml" ;;
              *.webp) ctype="image/webp" ;;
              *.png) ctype="image/png" ;;
              *.jpg|*.jpeg) ctype="image/jpeg" ;;
              *.ico) ctype="image/x-icon" ;;
              *) ctype="application/octet-stream" ;;
            esac
            aws s3api put-object \
              --bucket "$BUCKET" \
              --key "$key" \
              --body "$file" \
              --acl public-read \
              --content-type "$ctype" \
              --endpoint-url "$ENDPOINT"
            echo "Uploaded: $key"
          }

          while IFS= read -r -d '' file; do
            upload_file "$file" || echo "WARN: failed to upload $file"
          done < <(find . -type f \
            ! -path './.git/*' \
            ! -path './.github/*' \
            ! -path './.vscode/*' \
            ! -path './.cursor/*' \
            ! -path './scripts/*' \
            ! -path './drive-archive/*' \
            ! -path './docs/*' \
            ! -name '*.md' \
            ! -name 'clone.ps1' \
            ! -name '.gitignore' \
            ! -name 'CONTEXT.md' \
            ! -name 'CNAME' \
            ! -name 'SETUP-START.html' \
            -print0)

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${BUCKET}.website.yandexcloud.net/")
          echo "Test URL http://${BUCKET}.website.yandexcloud.net/ -> HTTP ${HTTP_CODE}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARN: bucket website returned ${HTTP_CODE}. Check public access in Yandex Cloud console."
          fi
