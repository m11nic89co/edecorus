<!doctype html>
<html lang="ru">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<meta content="true" name="HandheldFriendly" />
	<meta content="width" name="MobileOptimized" />
	<meta content="yes" name="apple-mobile-web-app-capable" />
	<meta name="robots" content="noindex, nofollow">

	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="css/styles.css">
	<link rel="stylesheet" href="css/catalog.css">

	<title>Капельный полив — внутренняя страница</title>
</head>

<body class="page-catalog">
	<div class="page-catalog__main">
		<h2>«Капельный полив»</h2>
		<h3>Информация по комплекту</h3>
		<div class="page-catalog__section">
			<picture>
				<source type="image/webp" srcset="css/images/instr.webp">
				<img src="css/images/instr.jpg" class="catalog-img" alt="Схема капельного полива">
			</picture>
		</div>
		<div class="page-catalog__section">
			<picture>
				<source type="image/webp" srcset="css/images/komplekt.webp">
				<img src="css/images/komplekt.jpg" class="catalog-img" alt="Комплект капельного полива">
			</picture>
		</div>
		<div class="page-catalog__section">
			<picture>
				<source type="image/webp" srcset="css/images/fitingOtdelino.webp">
				<img src="css/images/fitingOtdelino.jpg" class="catalog-img" alt="Фитинг отдельно">
			</picture>
		</div>
	</div>

	<div id="site-footer-root"></div>
	<script src="js/site-footer.js" defer></script>
	<script src="js/site-modal.js" defer></script>
</body>

</html>
